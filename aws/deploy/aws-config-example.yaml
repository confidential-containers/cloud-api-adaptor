###########aws#############
apiVersion: v1
kind: Namespace
metadata:
  name: peer-pods
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: peer-pods-config
  namespace: peer-pods
data:
  CLOUD_PROVIDER: "aws"
---
apiVersion: v1
kind: Secret
metadata:
  name: peer-pods-secret
  namespace: peer-pods
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID:
  AWS_SECRET_ACCESS_KEY:
  AWS_REGION: us-east-1
