[Match]
Distribution=fedora

[Distribution]
Distribution=fedora
Release=42

[Content]
CleanPackageMetadata=true
SkeletonTrees=../../resources/binaries-tree
Packages=
    kernel
    kernel-core
    kernel-modules
    udev
    util-linux
    systemd
    systemd-networkd
    systemd-resolved
    dbus
    tpm2-tools
    iproute
    iptables
    afterburn
    fastfetch
    e2fsprogs
    cryptsetup
    nvidia-container-toolkit
    nvidia-driver-cuda-580.82.07
    kmod-nvidia-open-dkms-580.82.07
    gcc
    make
    elfutils-libelf-devel
    dwarves
    openssl

RemoveFiles=/etc/issue
RemoveFiles=/etc/issue.net

# Remove for reproducible builds
RemoveFiles=/var/log
RemoveFiles=/var/cache
RemoveFiles=/etc/pki/ca-trust/extracted/java/cacerts
            /usr/lib/sysimage/libdnf5/transaction_history.sqlite*
