# BYOM (Bring Your Own Machine) Provider Configuration

# Example command:
# TEST_PROVISION=yes BYOM_PODVM_IMAGE="name-of-byom-e2e-image" CLOUD_PROVIDER=byom TEST_PROVISION_FILE=/path/to/provision_byom.properties make test-e2e

# Running with Docker
DOCKER_HOST="unix:///var/run/docker.sock"
DOCKER_NETWORK_NAME="kind"
DOCKER_API_VERSION="1.48"

BYOM_PODVM_IMAGE="quay.io/confidential-containers/podvm-byom-e2e-image-amd64:latest"

# Cluster configuration
CLUSTER_NAME="peer-pods"

# Worker node name (defaults to "{CLUSTER_NAME}-worker" if empty)
WORKER_NODE_NAME=""

CONTAINER_RUNTIME="containerd"

# Kind cluster configuration file path (relative to test/provisioner/byom or absolute path)
KIND_CONFIG_FILE="../../byom/e2e/kind-config.yaml"

# SSH username for connecting to VMs (defaults to "peerpod")
SSH_USERNAME="peerpod"

# SSH key paths for CAA to access pod VMs (used in secrets)
# These should be paths to the SSH keys used when building the pod VM image
SSH_SECRET_PRIV_KEY_PATH="/root/.ssh/id_rsa"
SSH_SECRET_PUB_KEY_PATH="/root/.ssh/id_rsa.pub"

# Use pre-existing VMs by providing comma-separated IP addresses
# VM_POOL_IPS="192.168.122.100,192.168.122.101,192.168.122.102"
# Leave empty to auto-create containers from uploaded image
VM_POOL_IPS=""

# Number of containers to create for the pool
# Only used when VM_POOL_IPS is empty (auto-create mode)
POOL_SIZE="3"

# Custom CAA container image (optional)
CAA_IMAGE=""

# Custom CAA container image tag (optional)
CAA_IMAGE_TAG=""


