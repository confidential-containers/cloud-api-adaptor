# Default values for peerpods (CAA) chart

# Namespace where peerpods resources will be deployed
namespace: confidential-containers-system

# CAA (Cloud API Adaptor) image
image:
  name: quay.io/confidential-containers/cloud-api-adaptor
  # tag defaults to Chart.appVersion if not set
  tag: ""

# Cloud provider: libvirt, aws, azure, gcp, ibmcloud, vsphere
provider: libvirt

# Maximum number of peer pods allowed to run simultaneously
# This limit prevents resource exhaustion on the cloud provider
# Set to "0" for unlimited (not recommended for production)
limit: "10"

# Resource controllers (peerpod-ctrl + webhook)
# When enabled, installs peerpod-ctrl and webhook via pre-install hook
# NOTE: Webhook requires cert-manager to be installed in the cluster
resourceCtrl:
  enabled: true
  # Git reference for peerpod-ctrl and webhook kustomize configs
  # Can be a branch (main), tag (src/peerpod-ctrl/v0.16.0), or commit SHA
  gitRef: "main"

# kata-deploy subchart configuration
# TODO: shims.remote does not exist yet on kata-deploy side.
kata-deploy:
  snapshotter:
    setup: ["nydus"]
  shims:
    clh:
      enabled: false
    cloud-hypervisor:
      enabled: false
    dragonball:
      enabled: false
    fc:
      enabled: false
    qemu:
      enabled: false
    qemu-runtime-rs:
      enabled: false
    qemu-nvidia-gpu:
      enabled: false
    qemu-nvidia-gpu-snp:
      enabled: false
    qemu-nvidia-gpu-tdx:
      enabled: false
    qemu-snp:
      enabled: false
    qemu-tdx:
      enabled: false
    qemu-se:
      enabled: false
    qemu-se-runtime-rs:
      enabled: false
    qemu-cca:
      enabled: false
    qemu-coco-dev:
      enabled: false
    qemu-coco-dev-runtime-rs:
      enabled: false
    remote:
      enabled: true
      supportedArches:
        - amd64
        - s390x
      allowedHypervisorAnnotations: []
      containerd:
        snapshotter: "nydus"
      crio:
        guestPull: true
