{{- if .Values.resourceCtrl.enabled }}
# Resource controllers: peerpod-ctrl + webhook
#
# TODO: This pre-install hook should be avoided!
#
# Using Helm pre-install hook to fetch and install resources from CAA GitHub
# repository using kustomize, mirroring what `kubectl apply -k` would do.
#
# This approach is used temporarily to avoid duplicating YAML files while we
# determine the best long-term solution with the CAA project.
#
# NOTE: Webhook requires cert-manager to be installed in the cluster.

# RBAC for installer Job
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-peerpods-installer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: peerpods
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: installer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-peerpods-installer
  labels:
    app.kubernetes.io/name: peerpods
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: installer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
# CRDs
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - create
  - update
  - patch
# ClusterRoles and ClusterRoleBindings
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  verbs:
  - get
  - list
  - create
  - update
  - patch
# Roles and RoleBindings (in any namespace)
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - create
  - update
  - patch
# ServiceAccounts, Deployments, and Services
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  - services
  verbs:
  - get
  - list
  - create
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - create
  - update
  - patch
# Namespaces (to create controller namespaces if needed)
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-peerpods-installer
  labels:
    app.kubernetes.io/name: peerpods
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: installer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-peerpods-installer
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-peerpods-installer
  namespace: {{ .Values.namespace }}
---
# Installer Job
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-resourcectrl-install
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: peerpods
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: installer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: peerpods
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: installer
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-peerpods-installer
      containers:
      - name: install-resourcectrl
        image: registry.k8s.io/kustomize/kustomize:v5.0.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -e

          echo "Installing PeerPod controller (CRD + RBAC + Deployment)..."
          kubectl kustomize github.com/confidential-containers/cloud-api-adaptor//peerpod-ctrl/config/default?ref={{ .Values.resourceCtrl.gitRef }} | kubectl apply -f -

          echo "Installing PeerPods webhook..."
          kubectl kustomize github.com/confidential-containers/cloud-api-adaptor//webhook/config/default?ref={{ .Values.resourceCtrl.gitRef }} | kubectl apply -f -

          echo "All resource controllers installed successfully"
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
{{- end }}
