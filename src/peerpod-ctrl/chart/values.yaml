# Prefix prepended to all resource names
namePrefix: peerpodctrl-

# PeerPod controller image
image:
  repository: quay.io/confidential-containers/peerpod-ctrl
  tag: 2d2e7c2c0736ec41c889cd98442a598b8b93bc0b
  pullPolicy: IfNotPresent

# imagePullSecrets attached to the controller-manager pod for pulling the
# manager and (when enabled) kube-rbac-proxy images from private registries.
# Example:
#   imagePullSecrets:
#     - name: regcred
imagePullSecrets: []

# kube-rbac-proxy: Sidecar container that protects the /metrics endpoint with RBAC authentication
# When enabled, only authenticated clients with proper RBAC permissions can access metrics
# Set to false to expose metrics without authentication (not recommended for production)
authProxy:
  enabled: true
  image: registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.14.0

# Additional labels merged into the peerpod-ctrl controller-manager pod template.
# For example, opt into webhook injection via
# azure.workload.identity/use: "true" (Azure Workload Identity), or the
# equivalent label for other clouds' workload-identity webhooks.
podLabels: {}

# ServiceAccount customization for the peerpod-ctrl controller-manager.
# For example, attach a cloud workload-identity binding via
# annotations.azure\.workload\.identity/client-id (Azure Workload Identity),
# or the equivalent GCP / AWS annotation, so the controller can authenticate
# to the cloud provider.
serviceAccount:
  annotations: {}
