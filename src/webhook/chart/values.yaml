# Prefix prepended to all resource names
namePrefix: peer-pods-webhook-

# By default this chart uses .Release.Namespace as the namespace for all resources.
# When installed as a subchart, Helm uses the parent chart's namespace (for peerpods
# this is typically confidential-containers-system). However, to maintain consistency
# with the kustomize deployment approach that deploys webhook resources in a separate
# namespace (peer-pods-webhook-system), this override is provided. Set to empty string
# to use .Release.Namespace instead, or override with --set namespaceOverride=<namespace>.
namespaceOverride: "peer-pods-webhook-system"

# Webhook deployment configuration
replicas: 2

# Webhook image
image:
  repository: quay.io/confidential-containers/peer-pods-webhook
  tag: latest
  pullPolicy: IfNotPresent

# Manager container resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Webhook configuration
webhook:
  # Runtime class to target for pod mutations
  targetRuntimeClass: kata-remote
  # Extended resource name for pod VM
  podVMExtendedResource: kata.peerpods.io/vm
  # Webhook failure policy: Fail or Ignore
  failurePolicy: Fail
  annotations: {}
  labels: {}

# Minimum TLS version for the webhook server. Accepts "VersionTLS12" or "VersionTLS13".
# Defaults to Go's TLS default (TLS 1.2) when empty.
# Injected by the operator from the cluster TLS profile via TLS_MIN_VERSION env var.
tlsMinVersion: ""

# Comma-separated list of IANA TLS cipher suite names for the webhook server.
# Not applicable when tlsMinVersion is VersionTLS13.
# Injected by the operator from the cluster TLS profile via TLS_CIPHER_SUITES env var.
tlsCipherSuites: ""

# cert-manager integration for webhook TLS certificates
# Required because Kubernetes admission webhooks must use TLS/HTTPS
# cert-manager automates certificate generation, rotation, and trust configuration
# Without this, you would need to manually create and manage webhook certificates
certManager:
  enabled: true
