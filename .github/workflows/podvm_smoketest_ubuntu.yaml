name: Ubuntu podvm smoke test

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build the image
    runs-on: 'ubuntu-24.04'

    defaults:
      run:
        working-directory: src/cloud-api-adaptor/podvm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Required by rootless mkosi on Ubuntu 24.04
      - name: Un-restrict user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            genisoimage \
            qemu-utils

      - name: Read properties from versions.yaml
        working-directory: src/cloud-api-adaptor
        run: |
          {
            echo "MKOSI_VERSION=$(./hack/versions.py -q tools.mkosi)";
            echo "ORAS_VERSION=$(./hack/versions.py -q tools.oras)";
            echo "KATA_REF=$(./hack/versions.py -q oci.kata-containers.reference)";
            echo "KATA_REG=$(./hack/versions.py -q oci.kata-containers.registry)";
          } >> "$GITHUB_ENV"

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: ${{ env.ORAS_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build binaries
        run: make podvm-binaries
        env:
          PODVM_DISTRO: ubuntu

      - name: Disable TLS for agent-protocol-forwarder
        run: |
          mkdir -p ./resources/binaries-tree/etc/default
          echo "TLS_OPTIONS=-disable-tls" > ./resources/binaries-tree/etc/default/agent-protocol-forwarder

      - name: Build Ubuntu image
        run: make image-debug
        env:
          PODVM_DISTRO: ubuntu

      # Upload the image to the artifacts
      - name: Upload qcow2 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podvm-build-ubuntu
          path: src/cloud-api-adaptor/podvm/build/podvm-ubuntu-amd64.qcow2

  test:
    name: Test the image
    runs-on: 'ubuntu-24.04'
    needs: build

    strategy:
      fail-fast: false
      matrix:
        test-mode:
          - name: podvm-ubuntu
            mode: basic
          - name: podvm-with-scratch-space-ubuntu
            mode: scratch-space
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gdisk \
            genisoimage \
            qemu-utils \
            socat \
            virt-manager

      - name: Read properties from versions.yaml
        working-directory: src/cloud-api-adaptor
        run: |
          {
            echo "ORAS_VERSION=$(./hack/versions.py -q tools.oras)";
            echo "KATA_REF=$(./hack/versions.py -q oci.kata-containers.reference)";
            echo "KATA_REG=$(./hack/versions.py -q oci.kata-containers.registry)";
          } >> "$GITHUB_ENV"

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: ${{ env.ORAS_VERSION }}

      - name: Install kata-agent-ctl
        run: |
          oras pull "${KATA_REG}/agent-ctl:${KATA_REF}-x86_64"
          tar --zstd -xf kata-static-agent-ctl.tar.zst
          cp opt/kata/bin/kata-agent-ctl /usr/local/bin

      - name: Download qcow2 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: podvm-build-ubuntu
          path: .

      - name: Run smoke test (${{ matrix.test-mode.name }})
        env:
          TEST_MODE: ${{ matrix.test-mode.mode }}
        run: src/cloud-api-adaptor/podvm/hack/smoke_test.sh -m "$TEST_MODE" podvm-ubuntu-amd64.qcow2
