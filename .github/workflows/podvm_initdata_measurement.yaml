#
# Build the mkosi debug image and run the initdata PCR8 measurement test.
---
name: Test initdata PCR8 measurement

on:
  push:
    branches:
      - main
    paths:
      - 'src/cloud-api-adaptor/hack/test-initdata-measurement.sh'
      - 'src/cloud-api-adaptor/podvm-mkosi/**'
      - 'src/cloud-api-adaptor/pkg/userdata/**'
      - 'src/cloud-api-adaptor/cmd/process-user-data/**'
      - '.github/workflows/podvm_initdata_measurement.yaml'
  pull_request:
    paths:
      - 'src/cloud-api-adaptor/hack/test-initdata-measurement.sh'
      - 'src/cloud-api-adaptor/podvm-mkosi/**'
      - 'src/cloud-api-adaptor/pkg/userdata/**'
      - 'src/cloud-api-adaptor/cmd/process-user-data/**'
      - '.github/workflows/podvm_initdata_measurement.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build mkosi debug image
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/cloud-api-adaptor/podvm-mkosi
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Required by rootless mkosi on Ubuntu 24.04
      - name: Un-restrict user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            alien \
            bubblewrap \
            dnf \
            qemu-utils \
            uidmap
          # yq may be pre-installed on self-hosted runners
          command -v yq || sudo snap install yq
          yq --version | grep -qE 'v4\.[0-9]+' || { echo "yq version is not 4.x, please install yq 4.x"; exit 1; }

      - name: Read properties from versions.yaml
        working-directory: src/cloud-api-adaptor
        run: echo "MKOSI_VERSION=$(yq -e '.tools.mkosi' versions.yaml)" >> "$GITHUB_ENV"

      - name: Build binaries
        run: VERIFY_PROVENANCE=yes make binaries

      - name: Build mkosi debug image
        run: make image-debug

      - name: Upload qcow2 artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: podvm-debug-build
          path: src/cloud-api-adaptor/podvm-mkosi/build/podvm-fedora-amd64.qcow2
          retention-days: 1

  test:
    name: Run initdata PCR8 measurement test
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            genisoimage \
            jq \
            ovmf \
            qemu-system-x86 \
            socat \
            swtpm \
            xxd

      - name: Download qcow2 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: podvm-debug-build
          path: .

      - name: Run initdata measurement test
        run: |
          src/cloud-api-adaptor/hack/test-initdata-measurement.sh \
            -i podvm-fedora-amd64.qcow2
