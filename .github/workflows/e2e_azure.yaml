# Provision an Azure AKS cluster via the existing e2e provisioner framework.
name: (Callable) azure e2e tests

on:
  workflow_call:
    inputs:
      git_ref:
        default: 'main'
        description: Git ref to checkout the cloud-api-adaptor repository. Defaults to main.
        required: false
        type: string
      podvm_image:
        required: true
        description: The OCI image storing the qcow2 podmv image
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true

permissions: {}

env:
  CLOUD_PROVIDER: azure
  DEBIAN_FRONTEND: noninteractive

defaults:
  run:
    working-directory: src/cloud-api-adaptor

jobs:
  test:
    name: Azure e2e tests
    runs-on: ubuntu-22.04
    permissions:
      id-token: write # Required for Azure login
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref }}
          persist-credentials: false

      - name: Read versions
        run: |
          {
            echo "GO_VERSION=$(./hack/versions.py -q 'tools.golang')"
            echo "ORAS_VERSION=$(./hack/versions.py -q 'tools.oras')"
          } >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
          cache: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: ${{ env.ORAS_VERSION }}

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: Publish image
        id: publish-image
        env:
          PODVM_OCI_IMAGE: "${{ inputs.podvm_image }}"
          IMAGE_VERSION: "0.${{ github.run_number }}.${{ github.run_attempt }}"
          RESOURCE_GROUP: "${{ vars.AZURE_RESOURCE_GROUP }}"
          IMAGE_GALLERY: "${{ vars.AZURE_PODVM_GALLERY_NAME }}"
          IMAGE_DEFINITION: "${{ vars.AZURE_PODVM_IMAGE_DEF_NAME }}"
          STORAGE_ACCOUNT: "${{ vars.AZURE_STORAGE_ACCOUNT }}"
          CONTAINER: "${{ vars.AZURE_STORAGE_CONTAINER }}"
        working-directory: src/cloud-api-adaptor/azure
        run: |
          make check-tools
          image_id=$(make publish-image)
          echo "image-id=$image_id" >> "$GITHUB_OUTPUT"

      - name: Build provisioner CLI
        run: |
          make -C test/tools BUILTIN_CLOUD_PROVIDERS=azure provisioner-cli

      - name: Create properties file
        id: create-properties-file
        env:
          AZURE_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
          AZURE_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          CLUSTER_NAME: "caa-e2e-${{ github.run_id }}-${{ github.run_attempt }}"
          LOCATION: "eastus"
          MANAGED_IDENTITY_NAME: "${{ vars.AZURE_MANAGED_IDENTITY_NAME }}"
          RESOURCE_GROUP_NAME: "${{ vars.AZURE_RESOURCE_GROUP }}"
          AZURE_IMAGE_ID: "${{ steps.publish-image.outputs.image-id }}"
        run: |
          cat <<EOF > azure.properties
          AZURE_CLIENT_ID="${AZURE_CLIENT_ID}"
          AZURE_SUBSCRIPTION_ID="${AZURE_SUBSCRIPTION_ID}"
          AZURE_IMAGE_ID="${AZURE_IMAGE_ID}"
          CLUSTER_NAME="${CLUSTER_NAME}"
          CONTAINER_RUNTIME="containerd"
          FEDERATED_CREDENTIAL_NAME="${CLUSTER_NAME}"
          IS_CI_MANAGED_CLUSTER="true"
          LOCATION="${LOCATION}"
          MANAGED_IDENTITY_NAME="${MANAGED_IDENTITY_NAME}"
          RESOURCE_GROUP_NAME="${RESOURCE_GROUP_NAME}"
          EOF
          echo "::group::azure.properties"
          cat azure.properties
          echo "::endgroup::"
          echo "properties-file=${PWD}/azure.properties" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          TEST_PROVISION: "yes"
          RUN_TESTS: "^TestCreateSimplePodAzure$"
          TEST_PROVISION_FILE: "${{ steps.create-properties-file.outputs.properties-file }}"
        run: make test-e2e

      - name: Deprovision AKS cluster
        if: always()
        env:
          TEST_PROVISION_FILE: ${{ steps.create-properties-file.outputs.properties-file }}
        run: ./test/tools/caa-provisioner-cli -action=deprovision || true

      - name: Cleanup image
        if: always()
        env:
          IMAGE_VERSION: "0.${{ github.run_number }}.${{ github.run_attempt }}"
          RESOURCE_GROUP: "${{ vars.AZURE_RESOURCE_GROUP }}"
          IMAGE_GALLERY: "${{ vars.AZURE_PODVM_GALLERY_NAME }}"
          IMAGE_DEFINITION: "${{ vars.AZURE_PODVM_IMAGE_DEF_NAME }}"
          STORAGE_ACCOUNT: "${{ vars.AZURE_STORAGE_ACCOUNT }}"
          CONTAINER: "${{ vars.AZURE_STORAGE_CONTAINER }}"
        working-directory: src/cloud-api-adaptor/azure
        run: make remove-image
