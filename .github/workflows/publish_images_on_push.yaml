#
# Build and push project images on pull requests merged.
---
name: Publish project images

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  caa:
    uses: ./.github/workflows/caa_build_and_push_per_arch.yaml
    with:
      git_ref: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    secrets:
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  csi-wrapper:
    uses: ./.github/workflows/csi_wrapper_images.yaml
    with:
      image_tags: latest,${{ github.sha }}
      git_ref: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    secrets:
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  peerpod-ctrl:
    uses: ./.github/workflows/peerpod-ctrl_image.yaml
    with:
      image_tags: latest,${{ github.sha }}
      git_ref: ${{ github.sha }}

    permissions:
      contents: read
      packages: write
    secrets:
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  webhook:
    uses: ./.github/workflows/webhook_image.yaml
    with:
      image_tags: ${{ github.sha }},latest
      git_ref: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    secrets:
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  peerpods-chart:
    uses: ./.github/workflows/peerpods-chart_image.yaml
    with:
      chart_version: "0.0.0-dev"
      git_ref: ${{ github.sha }}
    permissions:
      contents: read       # Required for checkout
      packages: write      # Required for pushing to GitHub Container Registry
      id-token: write      # Required for attestation signing
      attestations: write  # Required for persisting attestations