name: Create Test Images

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'src/cloud-api-adaptor/test/e2e/fixtures/Dockerfile.*'
      - '.github/workflows/test-images.yaml'

defaults:
  run:
    working-directory: src/cloud-api-adaptor

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  list-dockerfiles:
    name: list-dockerfiles
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ env.MATRIX }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: set-matrix
        run: echo "MATRIX=$(find test/e2e/fixtures/Dockerfile.* | jq -R -s -c 'split("\n")[:-1]')" >> "$GITHUB_ENV"
  build:
    name: Create Test Images
    needs: list-dockerfiles
    runs-on: ubuntu-24.04
    environment: production
    strategy:
      fail-fast: false
      matrix:
        targets: ${{ fromJson(needs.list-dockerfiles.outputs.matrix) }}
        arch: [amd64, s390x, arm64]
    permissions:
      contents: read  # Required to checkout code
      packages: write  # Required to push container images
    steps:
    - name: Checkout Code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Login to Quay container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: quay.io
        username: ${{ vars.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    - name: determine docker tag by splitting branch name on slash
      id: docker-tag
      shell: bash
      env:
        MATRIX_TARGET: ${{ matrix.targets }}
      run: |
        file_name=$(basename "${MATRIX_TARGET}")
        echo "DOCKER_TAG=${file_name##*.}" >> "$GITHUB_ENV"
    - name: Build and push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        tags: |
          quay.io/confidential-containers/test-images:${{env.DOCKER_TAG}}
        push: true
        context: src/cloud-api-adaptor/
        platforms: linux/s390x,linux/amd64,linux/arm64
        file: src/cloud-api-adaptor/${{matrix.targets}}
        build-args: |
          "ARCH=${{ matrix.arch }}"
