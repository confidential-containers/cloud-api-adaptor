name: GitHub Actions Security Analysis with 🌈zizmor

on:
  push:
    branches: [ "main" ]
  pull_request:
    paths: [ "**" ]
  schedule:
  - cron: "0 3 * * 1" # Every Monday Weekly

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # current latest version v5.0.0
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Run zizmor
      uses: zizmorcore/zizmor-action@5ca5fc7a4779c5263a3ffa0e1f693009994446d1 # current latest v0.1.2
